apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-visualizer.fullname" . }}-backend
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-visualizer.fullname" . }}-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-visualizer.fullname" . }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-visualizer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
