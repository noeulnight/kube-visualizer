apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-visualizer.fullname" . }}-visualizer
  labels:
    {{- include "kube-visualizer.labels" . | nindent 4 }}
    app.kubernetes.io/component: visualizer
spec:
  type: {{ .Values.visualizer.service.type }}
  ports:
    - port: {{ .Values.visualizer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kube-visualizer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: visualizer
